name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: npm audit --audit-level moderate

      - name: Check code formatting
        run: |
          if npm run format:check 2>/dev/null; then
            echo "✅ Code formatting check passed"
          else
            echo "⚠️  Prettier not available, skipping format check"
          fi

      - name: Lint JavaScript (if ESLint available)
        run: |
          if command -v npx >/dev/null 2>&1 && npx eslint --version >/dev/null 2>&1; then
            echo "Running ESLint..."
            npx eslint "**/*.js" --ext .js
          else
            echo "ESLint not configured, skipping lint check"
          fi

      - name: Check for TODO comments
        run: |
          echo "Checking for TODO comments..."
          grep -r "TODO\|FIXME\|XXX" --include="*.js" --exclude-dir=node_modules . || echo "No TODO comments found"
